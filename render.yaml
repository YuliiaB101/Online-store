services:
  # Database
  - type: pserv
    name: floria-db
    plan: free
    databaseName: online_store
    databaseUser: floria_user
    region: frankfurt

  # Backend Web Service
  - type: web
    name: floria-backend
    runtime: node
    plan: free
    region: frankfurt
    rootDirectory: backend
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: floria-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/products