services:
  - type: web
    name: floria-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: yarn install --production=false && yarn run build && yarn run seed
    startCommand: yarn run start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: floria-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    name: floria-frontend
    runtime: static
    rootDir: apps/frontend
    buildCommand: yarn install && yarn run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://floria-backend.onrender.com

databases:
  - name: floria-db
    databaseName: floria
    user: floria_user
    plan: free
